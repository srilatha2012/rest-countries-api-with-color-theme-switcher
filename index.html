<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REST Countries API</title>
    <link rel="stylesheet" href="./styles/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;600;800&display=swap" rel="stylesheet">
    <script defer type="module" src="./dist/main.js"></script>
</head>

<body>
    <div class="header-container">

        <h2>Where in the world?</h2>
        <div class="dark-mode-section" id="theme-toggle">
            <span>Dark Mode</span>
            <span><img src="./images/moon-regular-full.svg" alt="moon icon" style="height: 25px; width: 25px;"></span>
        </div>
    </div>
    <div class="filter-container">
        <div class="search-input-wrapper">
            <span class="search-icon">
                <img src="./images/search-outline.svg" alt="search icon">
            </span>
            <input class="search-input" id="search-input" type="text" name="" placeholder="Search for a country...">
        </div>
        <select class="filter-select" id="filter-select" name="region">
            <option value="">Filter by Region</option>
            <option value="Africa">Africa</option>
            <option value="Americas">Americas</option>
            <option value="Asia">Asia</option>
            <option value="Europe">Europe</option>
            <option value="Oceania">Oceania</option>
        </select>
    </div>
    <div class="countries-grid-container" id="countries-container">
    </div>

</body>

</html>
