<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REST Countries API</title>
    <link rel="stylesheet" href="./styles/style.css">
    <script defer type="module" src="./dist/main.js"></script>
</head>
<body>
    <div class="header-container">
       <h2>Where are in the world?</h2>
        <div class ="dark-mode-section">
        <span>Dark Mode</span>
        <span><img src="./images/moon-regular-full.svg" alt="moon icon" style="height: 25px; width: 25px;"></span>
       </div>
    </div>
    <div class="filter-container">
        <input class = "search-input" type="text" name ="" placeholder="Search for a country...">
        <select class= "filter-select" name="region">
            <option value="">Filter by Region</option>
            <option value="Africa">Africa</option>
            <option value="America">America</option>
            <option value="Asia">Asia</option>
            <option value="Europe">Europe</option>
            <option value="Oceania">Oceania</option>
        </select>
    </div>
    <div class="countries-grid-container" id ="countries-container">
    </div>

</body>
</html>
